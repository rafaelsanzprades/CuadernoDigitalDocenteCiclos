name: Deploy to Firebase Hosting on merge
'on':
  push:
    branches:
      - main
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'
          
      - name: Install Dependencies
        run: npm ci

      - name: Create .env.production
        run: |
          echo "NEXT_PUBLIC_API_URL=https://cdd-backend-215337606799.europe-west1.run.app" > .env.production
          echo "NEXTAUTH_URL=https://cuadernofp.web.app" >> .env.production
          echo "NEXTAUTH_SECRET=produccion-super-secreta-cdd-88990" >> .env.production

      - name: Build Next.js App
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: https://cdd-backend-215337606799.europe-west1.run.app
          NEXTAUTH_URL: https://cuadernofp.web.app
        
      - name: Deploy to Firebase
        run: npx firebase-tools deploy --only hosting,functions --project cuadernofp
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
          FIREBASE_CLI_EXPERIMENTS: webframeworks
